services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: market
      POSTGRES_PASSWORD: market
      POSTGRES_DB: market
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U market -d market"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: ./backend
    env_file:
      - .env.example
    environment:
      DATABASE_URL: postgresql://market:market@postgres:5432/market
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    env_file:
      - .env.example
    environment:
      NEXT_PUBLIC_BACKEND_HTTP_URL: http://localhost:8000
      NEXT_PUBLIC_BACKEND_WS_URL: ws://localhost:8000/ws/market
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
